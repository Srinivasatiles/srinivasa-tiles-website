<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Srinivasa Tiles — Photo Manager</title>
  <link rel="icon" href="../assets/images/logo/logo-icon.png">
  <style>
    body { font-family: -apple-system, sans-serif; background:#FBF6EC; }
    #nc-root { min-height: 100vh; }
  </style>
  <!-- Netlify Identity widget: lets you log in -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
  <div id="nc-root"></div>
  <!-- Decap CMS (free, open-source admin panel for static sites) -->
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    // Redirect to the site after login/logout so the widget works from any page
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", user => {
        if (!user) {
          window.netlifyIdentity.on("login", () => { document.location.href = "/admin/"; });
        }
      });
    }
  </script>
</body>
</html>
